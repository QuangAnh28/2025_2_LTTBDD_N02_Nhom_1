name: lttbdd
description: "Bookify - Ứng dụng đọc sách điện tử"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  fl_chart: ^0.66.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  syncfusion_flutter_pdfviewer: ^32.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/pdf/
